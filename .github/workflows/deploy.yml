name: Deploy portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Create Supabase config
        run: |
          cat > supabase-config.js <<'EOF'
          window.SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          window.SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          EOF

      - name: Force add Supabase config
        run: git add -f supabase-config.js

      - name: Show generated config
        run: |
          ls -la
          cat supabase-config.js

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: .
