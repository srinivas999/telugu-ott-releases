name: Deploy static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          IS_GITHUB_DEPLOY: 'true'
          NEXT_PUBLIC_IS_GITHUB_DEPLOY: 'true'
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_TMDB_API_KEY: ${{ secrets.NEXT_PUBLIC_TMDB_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          TMDB_API_READ_ACCESS_TOKEN: ${{ secrets.TMDB_API_READ_ACCESS_TOKEN }}
        run: |
          npm run build

      - name: Add Supabase runtime config
        run: |
          mkdir -p out
          cat > out/supabase-config.js <<'EOF'
          window.SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          window.SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}"
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: out
